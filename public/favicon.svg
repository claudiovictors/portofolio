<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo escuro arredondado -->
  <rect width="100" height="100" rx="25" fill="#0D1117"/>
  
  <!-- Detalhe de borda sutil -->
  <rect x="2" y="2" width="96" height="96" rx="23" fill="none" stroke="#21262D" stroke-width="2"/>
  
  <!-- Iniciais CV com tipografia moderna -->
  <text x="50" y="68" font-family="Inter, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#58A6FF" text-anchor="middle" letter-spacing="-2">CV</text>
  
  <!-- Ponto de destaque (estilo terminal/código) -->
  <circle cx="78" cy="30" r="6" fill="#58A6FF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
